<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" role="img" aria-labelledby="title desc">
  <title id="title">Three-step online converter flow</title>
  <desc id="desc">Step one: drop the file. Step two: choose MP3 as the output format. Step three: download the converted file.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="card" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="640" height="240" rx="16" fill="#f8fafc"/>

  <!-- Step 1: Drop file -->
  <g transform="translate(20, 30)">
    <rect width="180" height="180" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-dasharray="5 4" filter="url(#card)"/>
    <circle cx="22" cy="22" r="14" fill="#0ea5e9"/>
    <text x="22" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
    <!-- File icon -->
    <g transform="translate(70, 60)">
      <path d="M0 0 h28 l12 12 v36 a4 4 0 0 1 -4 4 h-36 a4 4 0 0 1 -4 -4 v-44 a4 4 0 0 1 4 -4 z" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
      <path d="M28 0 v12 h12" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
      <text x="20" y="34" font-family="system-ui" font-size="9" font-weight="600" fill="#0369a1" text-anchor="middle">AAC</text>
    </g>
    <text x="90" y="150" font-family="system-ui" font-size="13" font-weight="600" fill="#334155" text-anchor="middle">Drop your file</text>
    <text x="90" y="167" font-family="system-ui" font-size="11" fill="#94a3b8" text-anchor="middle">or click to browse</text>
  </g>

  <!-- Arrow 1→2 -->
  <path d="M 210 120 L 234 120" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 2: Pick format -->
  <g transform="translate(240, 30)">
    <rect width="160" height="180" rx="12" fill="#ffffff" stroke="#e2e8f0" filter="url(#card)"/>
    <circle cx="22" cy="22" r="14" fill="#0ea5e9"/>
    <text x="22" y="27" font-family="system-ui" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
    <text x="80" y="60" font-family="system-ui" font-size="11" fill="#64748b" text-anchor="middle">Convert to</text>
    <!-- Big MP3 button -->
    <rect x="20" y="74" width="120" height="44" rx="8" fill="#0ea5e9"/>
    <text x="80" y="102" font-family="system-ui" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">MP3</text>
    <path d="M125 96 l4 5 l4 -5" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Quality hint -->
    <text x="80" y="140" font-family="system-ui" font-size="10" fill="#94a3b8" text-anchor="middle">Quality: standard</text>
    <text x="80" y="156" font-family="system-ui" font-size="10" fill="#94a3b8" text-anchor="middle">Channels: stereo</text>
  </g>

  <!-- Arrow 2→3 -->
  <path d="M 410 120 L 434 120" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 3: Download -->
  <g transform="translate(440, 30)">
    <rect width="180" height="180" rx="12" fill="#ffffff" stroke="#e2e8f0" filter="url(#card)"/>
    <circle cx="22" cy="22" r="14" fill="#0ea5e9"/>
    <text x="22" y="27" font-family="system-ui" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
    <!-- Download circle with arrow -->
    <circle cx="90" cy="80" r="26" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
    <path d="M90 67 v22 M80 81 l10 10 l10 -10" stroke="#16a34a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Filename pill -->
    <rect x="30" y="120" width="120" height="26" rx="13" fill="#f1f5f9"/>
    <text x="90" y="137" font-family="system-ui" font-size="11" font-weight="600" fill="#334155" text-anchor="middle">audio.mp3</text>
    <text x="90" y="170" font-family="system-ui" font-size="11" fill="#94a3b8" text-anchor="middle">Ready in seconds</text>
  </g>
</svg>
