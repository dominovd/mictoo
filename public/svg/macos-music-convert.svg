<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" role="img" aria-labelledby="title desc">
  <title id="title">macOS Music app: File menu → Convert → Create MP3 Version</title>
  <desc id="desc">Open Music app, click File in the menu bar, hover Convert in the dropdown, then choose Create MP3 Version from the submenu.</desc>
  <defs>
    <filter id="menushadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="640" height="280" rx="16" fill="#f1f5f9"/>

  <!-- macOS-style menu bar -->
  <g transform="translate(40, 30)">
    <rect width="560" height="28" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
    <!-- Apple icon -->
    <circle cx="20" cy="14" r="5" fill="#334155"/>
    <text x="50" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Music</text>
    <!-- File menu highlighted -->
    <rect x="92" y="4" width="40" height="20" rx="4" fill="#0ea5e9"/>
    <text x="112" y="18" font-family="system-ui" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">File</text>
    <text x="150" y="18" font-family="system-ui" font-size="12" fill="#475569">Edit</text>
    <text x="190" y="18" font-family="system-ui" font-size="12" fill="#475569">Song</text>
    <text x="234" y="18" font-family="system-ui" font-size="12" fill="#475569">View</text>
    <text x="276" y="18" font-family="system-ui" font-size="12" fill="#475569">Controls</text>
    <text x="334" y="18" font-family="system-ui" font-size="12" fill="#475569">Account</text>
    <text x="390" y="18" font-family="system-ui" font-size="12" fill="#475569">Window</text>
    <text x="446" y="18" font-family="system-ui" font-size="12" fill="#475569">Help</text>
  </g>

  <!-- File dropdown -->
  <g transform="translate(92, 62)" filter="url(#menushadow)">
    <rect width="200" height="160" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="14" y="24" font-family="system-ui" font-size="12" fill="#334155">New</text>
    <text x="14" y="46" font-family="system-ui" font-size="12" fill="#334155">Open File…</text>
    <text x="14" y="68" font-family="system-ui" font-size="12" fill="#334155">Open Stream URL…</text>
    <line x1="10" y1="78" x2="190" y2="78" stroke="#e2e8f0"/>
    <text x="14" y="98" font-family="system-ui" font-size="12" fill="#334155">Import…</text>
    <text x="14" y="120" font-family="system-ui" font-size="12" fill="#334155">Library</text>
    <line x1="10" y1="130" x2="190" y2="130" stroke="#e2e8f0"/>
    <!-- Convert item highlighted -->
    <rect x="4" y="138" width="192" height="18" rx="3" fill="#0ea5e9"/>
    <text x="14" y="151" font-family="system-ui" font-size="12" font-weight="600" fill="#ffffff">Convert</text>
    <path d="M180 145 l4 4 l-4 4" stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Convert submenu -->
  <g transform="translate(292, 188)" filter="url(#menushadow)">
    <rect width="220" height="68" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <!-- Highlighted MP3 row -->
    <rect x="4" y="4" width="212" height="22" rx="3" fill="#0ea5e9"/>
    <text x="14" y="20" font-family="system-ui" font-size="12" font-weight="700" fill="#ffffff">Create MP3 Version</text>
    <text x="14" y="44" font-family="system-ui" font-size="12" fill="#334155">Create AAC Version</text>
    <text x="14" y="62" font-family="system-ui" font-size="12" fill="#334155">Create AIFF Version</text>
  </g>
</svg>
